name: oss-security-scan

# Reusable workflow: multi-tier security scanning for public OSS repos.
#
# All inputs that reach run: commands flow through env: vars first, per
# GitHub's safe pattern:
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# No github.event.* fields are used in run: blocks.
#
# Tier 1 (every push + PR):
#   - typos:     spelling check across all tracked files
#   - gitleaks:  pattern-based credential scanner (direct install for version control)
#   - trufflehog: verified-secrets scanner with live API confirmation
#
# Tier 2 (caller passes run-osv-scanner: true; typically schedule-only):
#   - OSV-Scanner: transitive-dep CVE check across the OSV database
#
# Usage: see README.md or examples/.

on:
  workflow_call:
    inputs:
      gitleaks-version:
        description: 'gitleaks version to install'
        type: string
        default: '8.30.1'
      gitleaks-config:
        description: 'Path to gitleaks config (relative to repo root). If absent, gitleaks runs with built-in defaults.'
        type: string
        default: '.gitleaks.toml'
      trufflehog-extra-args:
        description: 'Extra args passed to trufflehog'
        type: string
        default: '--results=verified,unknown'
      run-typos:
        description: 'Run the typos spelling check'
        type: boolean
        default: true
      run-gitleaks:
        description: 'Run gitleaks'
        type: boolean
        default: true
      run-trufflehog:
        description: 'Run trufflehog'
        type: boolean
        default: true
      run-osv-scanner:
        description: 'Run OSV-Scanner (typically schedule-only)'
        type: boolean
        default: false

jobs:
  typos:
    if: ${{ inputs.run-typos }}
    name: typos (spelling check)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Explicit token + persist-credentials=false hardens checkout against
      # the transient GitHub-side auth flake observed 2026-05-23 in
      # creatornader/atrib post-merge run 26325615820: three internal
      # retries failed with "could not read Username for
      # 'https://github.com': terminal prompts disabled" on the default
      # credential-discovery path. Forcing github.token + skipping
      # persistence routes around the discovery path that flaked, and
      # typos itself needs no later git auth (it reads the working tree).
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          persist-credentials: false
      - name: Run typos
        uses: crate-ci/typos@v1.46.3

  gitleaks:
    if: ${{ inputs.run-gitleaks }}
    name: gitleaks (credential pattern scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: ${{ inputs.gitleaks-version }}
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        env:
          GITLEAKS_CONFIG_PATH: ${{ github.workspace }}/${{ inputs.gitleaks-config }}
        run: |
          if [ -f "$GITLEAKS_CONFIG_PATH" ]; then
            gitleaks git --no-banner -c "$GITLEAKS_CONFIG_PATH"
          else
            gitleaks git --no-banner
          fi

  trufflehog:
    if: ${{ inputs.run-trufflehog }}
    name: TruffleHog (verified-secrets scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: ${{ inputs.trufflehog-extra-args }}

  osv-scanner:
    if: ${{ inputs.run-osv-scanner }}
    name: OSV-Scanner (CVE scan)
    # Inline rather than calling google/osv-scanner-action/.github/workflows/
    # osv-scanner-reusable.yml so we control the Go toolchain. The upstream
    # reusable workflow runs the scanner inside a Docker image that bundles
    # Go 1.26.2 with GOTOOLCHAIN=local hardcoded. Any caller whose go.mod
    # requires a newer Go (e.g. atrib-log-pp-cli ran into this on 2026-05-24
    # with go 1.26.3 after the dep group bump) hits a govulncheck "loading
    # packages: go.mod requires go >= X" error. Installing osv-scanner on
    # the runner host with GOTOOLCHAIN=auto lets govulncheck transparently
    # fetch whatever toolchain go.mod asks for.
    #
    # Safety: no github.event.* values reach run: blocks. Step outputs are
    # read only inside if: expressions (boolean only) or via the env: ->
    # "$VAR" pattern, never interpolated directly into shell.
    runs-on: ubuntu-latest
    permissions:
      actions: read
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          persist-credentials: false
      # Conditional setup-go: go-version-file: 'go.mod' errors hard if go.mod
      # is absent, so non-Go callers (atrib, note-to-self) get the stable
      # branch which just installs Go for the osv-scanner CLI install step.
      # Go repos get whatever go.mod requires so govulncheck has the right
      # toolchain to load their packages without a version mismatch.
      - name: Detect go.mod
        id: gomod
        run: |
          if [ -f go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Go from go.mod (Go callers)
        if: steps.gomod.outputs.present == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: true
      - name: Set up Go (stable; non-Go callers)
        if: steps.gomod.outputs.present == 'false'
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - name: Install osv-scanner CLI
        env:
          GOTOOLCHAIN: auto
        run: |
          # Pinned to match what the previous reusable-workflow call used.
          # Bump alongside any oss-security-scan release that wants a newer
          # scanner; CI here is the verification path.
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.8
          osv-scanner --version
      - name: Run osv-scanner (SARIF for upload + summary on fail)
        id: scan
        env:
          # auto = if the caller's go.mod (or a transitive go.mod) requires
          # a newer Go than what setup-go installed, download it on demand.
          # This is the entire reason we inlined the scan: the upstream
          # container had GOTOOLCHAIN=local which blocks this fetch.
          GOTOOLCHAIN: auto
        run: |
          # osv-scanner exits non-zero when vulnerabilities are found.
          # Capture exit, still emit SARIF, decide on fail at the end so
          # SARIF lands in the Security tab even when vulns trigger a fail.
          # --output-file is the current spelling; --output is deprecated
          # but still accepted in v2.3.8.
          set +e
          osv-scanner scan source --recursive --format=sarif --output-file=results.sarif .
          SCAN_EXIT=$?
          set -e
          echo "exit_code=${SCAN_EXIT}" >> "$GITHUB_OUTPUT"
          # Human-readable summary alongside the SARIF artifact.
          osv-scanner scan source --recursive . || true
      - name: Upload SARIF to Security tab
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
      - name: Fail on vulnerability
        # osv-scanner exit codes (v2.3.8):
        #   0   = scan succeeded, no vulnerabilities found
        #   1   = vulnerabilities found (this is the only "real failure"
        #         we want to surface as a workflow failure)
        #   128 = "No package sources found" — not an error for repos
        #         that have no package manifests to scan (oss-security-scan
        #         itself, since it's a workflows-only repo). Pass.
        #   other = real errors (network, parsing, etc.) — also pass
        #         them up so they don't slip past silently. Keeping the
        #         contract: "fail iff vulnerabilities found."
        if: steps.scan.outputs.exit_code == '1'
        env:
          SCAN_EXIT_CODE: ${{ steps.scan.outputs.exit_code }}
        run: |
          echo "::error::osv-scanner exited ${SCAN_EXIT_CODE} (vulnerabilities found; see SARIF + job log)"
          exit "${SCAN_EXIT_CODE}"
      - name: Surface non-vuln scanner error
        # Non-zero exit that isn't 1 (vulns) or 128 (no sources) — typically
        # network or parsing failure inside the scanner. Surfaces as a
        # workflow warning, not failure, to avoid blocking the scan when the
        # underlying tool flakes. Future iteration may upgrade to fail.
        if: steps.scan.outputs.exit_code != '0' && steps.scan.outputs.exit_code != '1' && steps.scan.outputs.exit_code != '128'
        env:
          SCAN_EXIT_CODE: ${{ steps.scan.outputs.exit_code }}
        run: |
          echo "::warning::osv-scanner exited ${SCAN_EXIT_CODE} (non-vuln error; see job log for context)"
