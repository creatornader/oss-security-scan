name: security-scan

# Security scanning for the full-stack-starter wire-up.
#
# Caller for the reusable workflow at creatornader/oss-security-scan,
# which runs typos + gitleaks + trufflehog + osv-scanner. OSV-Scanner
# is gated to the scheduled run (Sunday 09:00 UTC) so PRs and pushes
# stay fast.
#
# pre-commit job runs textleaks + oss-twin-check at PR time as the
# CI-side enforcement of the local hooks in .pre-commit-config.yaml.
#
# All run: blocks use no github.event.* inputs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 0'

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  scan:
    uses: creatornader/oss-security-scan/.github/workflows/oss-security-scan.yml@v0.1.0
    with:
      gitleaks-version: '8.30.1'
      gitleaks-config: '.gitleaks.toml'
      run-osv-scanner: ${{ github.event_name == 'schedule' }}

  pre-commit:
    name: pre-commit (textleaks + oss-twin-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1
