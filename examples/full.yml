name: security-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 0'

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  scan:
    uses: creatornader/oss-security-scan/.github/workflows/oss-security-scan.yml@v0.1.0
    with:
      gitleaks-version: '8.30.1'
      gitleaks-config: '.gitleaks.toml'
      typos-version: 'v1.46.1'
      trufflehog-extra-args: '--results=verified,unknown'
      run-typos: true
      run-gitleaks: true
      run-trufflehog: true
      run-osv-scanner: ${{ github.event_name == 'schedule' }}
      osv-scanner-version: 'v2.3.8'
